<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Pulse Messenger</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    * { box-sizing:border-box; }
    body { margin:0; font-family:system-ui, sans-serif; background:#f2f2f2; }

    .screen { display:none; padding:16px; max-width:600px; margin:0 auto; }
    .screen.active { display:block; }

    h2, h3 { margin:8px 0 12px; }

    input, button {
        width:100%; padding:12px; margin:6px 0 10px;
        font-size:16px; border-radius:10px; border:1px solid #ccc;
        outline:none; transition:0.15s;
    }
    input:focus { border-color:#0088ff; box-shadow:0 0 0 1px #0088ff33; }
    button {
        background:#0088ff; color:white; border:none; font-weight:600;
        cursor:pointer;
    }

    #chat-list .chat-item {
        padding:10px 12px; background:white; margin-bottom:6px;
        border-radius:10px; cursor:pointer;
    }

    #messages {
        height:50vh; overflow-y:auto; padding:10px;
        background:white; border-radius:10px; margin-bottom:8px;
    }

    .msg {
        padding:8px 12px; margin:4px 0; border-radius:12px;
        max-width:75%; word-wrap:break-word;
    }
    .me { background:#d1eaff; margin-left:auto; }
    .them { background:#e8e8e8; margin-right:auto; }

    #search-results .search-item {
        padding:8px 10px; background:white; margin:4px 0;
        border-radius:10px; cursor:pointer;
    }

    .top-bar {
        display:flex; justify-content:space-between; align-items:center;
        margin-bottom:10px;
    }
    .top-title { font-size:20px; font-weight:700; }
    .small-link { font-size:13px; color:#007bff; cursor:pointer; }

    .row { display:flex; gap:6px; }
    .row input { flex:1; }
    .row button { width:auto; padding:10px 14px; }
</style>
</head>

<body>

<!-- ЭКРАН ВВОДА НОМЕРА -->
<div id="screen-phone" class="screen active">
    <div class="top-bar">
        <div class="top-title">Pulse</div>
    </div>
    <h2>Вход по номеру</h2>
    <input id="phoneInput" placeholder="+79991234567">
    <button id="btnPhoneNext">Продолжить</button>
</div>

<!-- ЭКРАН ВХОДА -->
<div id="screen-auth" class="screen">
    <div class="top-bar">
        <div class="top-title">Вход</div>
        <div class="small-link" id="authChangePhone">Сменить номер</div>
    </div>
    <p id="authPhoneLabel"></p>
    <input id="authPassword" type="password" placeholder="Пароль">
    <button id="btnLogin">Войти</button>
</div>

<!-- ЭКРАН РЕГИСТРАЦИИ -->
<div id="screen-register" class="screen">
    <div class="top-bar">
        <div class="top-title">Регистрация</div>
        <div class="small-link" id="regChangePhone">Сменить номер</div>
    </div>
    <p id="regPhoneLabel"></p>
    <input id="regName" placeholder="Имя">
    <input id="regUsername" placeholder="username">
    <input id="regPassword" type="password" placeholder="Пароль">
    <button id="btnRegister">Создать аккаунт</button>
</div>

<!-- ГЛАВНЫЙ ЭКРАН -->
<div id="screen-main" class="screen">
    <div class="top-bar">
        <div class="top-title">Pulse</div>
        <div class="small-link" id="btnLogout">Выйти</div>
    </div>

    <input id="searchInput" placeholder="Поиск людей...">
    <div id="search-results"></div>

    <h3>Чаты</h3>
    <div id="chat-list"></div>

    <h3 id="chat-title">Выберите чат</h3>
    <div id="messages"></div>

    <div class="row">
        <input id="msgInput" placeholder="Сообщение...">
        <button id="msgSend">➤</button>
    </div>
</div>

<script>
// ------------------ КОНФИГ ------------------
const API = "https://pulse-production-1a74.up.railway.app";
const WS_URL = "wss://pulse-production-1a74.up.railway.app";

let currentUser = null;
let currentChat = null;
let ws = null;
let fullPhone = "";

// ------------------ УТИЛИТЫ ------------------
function showScreen(id) {
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.getElementById("screen-" + id).classList.add("active");
}

function setAuthPhoneLabel() {
    authPhoneLabel.textContent = "Номер: " + fullPhone;
}
function setRegPhoneLabel() {
    regPhoneLabel.textContent = "Номер: " + fullPhone;
}

// ------------------ WEBSOCKET ------------------
function connectWs() {
    if (!currentUser) return;

    ws = new WebSocket(WS_URL + "/?userId=" + currentUser.id);

    ws.onopen = () => console.log("WS connected");

    ws.onclose = () => {
        console.log("WS closed, retry...");
        setTimeout(connectWs, 2000);
    };

    ws.onmessage = (ev) => {
        const data = JSON.parse(ev.data);
        if (data.type === "message") {
            const msg = data.message;
            if (currentChat && currentChat.id === msg.chat_id) {
                appendMessage(msg);
            }
            loadChats();
        }
    };
}

// ------------------ ВХОД ПО НОМЕРУ ------------------
btnPhoneNext.onclick = async () => {
    fullPhone = phoneInput.value.trim();
    if (!fullPhone) return;

    const res = await fetch(API + "/api/checkUser?phone=" + encodeURIComponent(fullPhone));
    const data = await res.json();

    if (data.exists) {
        setAuthPhoneLabel();
        showScreen("auth");
    } else {
        setRegPhoneLabel();
        showScreen("register");
    }
};

authChangePhone.onclick = () => {
    fullPhone = "";
    localStorage.removeItem("phone");
    showScreen("phone");
};

regChangePhone.onclick = () => {
    fullPhone = "";
    localStorage.removeItem("phone");
    showScreen("phone");
};

// ------------------ ЛОГИН ------------------
btnLogin.onclick = async () => {
    const pass = authPassword.value.trim();
    if (!pass) return;

    const res = await fetch(API + "/api/login", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify({ phone: fullPhone, password: pass })
    });

    const data = await res.json();
    if (!res.ok) return alert("Неверный пароль");

    currentUser = data.user;
    localStorage.setItem("phone", fullPhone);

    await initMainScreen();
    connectWs();
    showScreen("main");
};

// ------------------ РЕГИСТРАЦИЯ ------------------
btnRegister.onclick = async () => {
    const name = regName.value.trim();
    const username = regUsername.value.trim();
    const pass = regPassword.value.trim();

    if (!name || !username || !pass) return alert("Заполните все поля");

    if (!/^[a-z0-9_]{5,32}$/i.test(username))
        return alert("username: латиница, цифры, _");

    const res = await fetch(API + "/api/register", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify({ phone: fullPhone, name, username, password: pass })
    });

    const data = await res.json();
    if (!res.ok) return alert("Ошибка регистрации");

    currentUser = data.user;
    localStorage.setItem("phone", fullPhone);

    await initMainScreen();
    connectWs();
    showScreen("main");
};

// ------------------ ВЫХОД ------------------
btnLogout.onclick = () => {
    currentUser = null;
    currentChat = null;
    if (ws) ws.close();
    localStorage.removeItem("phone");
    showScreen("phone");
};

// ------------------ BOOTSTRAP ------------------
async function bootstrap() {
    const saved = localStorage.getItem("phone");
    if (!saved) return;

    fullPhone = saved;

    const res = await fetch(API + "/api/checkUser?phone=" + encodeURIComponent(saved));
    const data = await res.json();

    if (data.exists) {
        setAuthPhoneLabel();
        showScreen("auth");
    } else {
        localStorage.removeItem("phone");
    }
}
bootstrap();

// ------------------ ГЛАВНЫЙ ЭКРАН ------------------
async function initMainScreen() {
    await loadChats();
}

async function loadChats() {
    const res = await fetch(API + "/api/chats?userId=" + currentUser.id);
    const chats = await res.json();
    renderChats(chats);
}

function renderChats(chats) {
    const list = document.getElementById("chat-list");
    list.innerHTML = "";

    chats.forEach(c => {
        const div = document.createElement("div");
        div.className = "chat-item";
        div.textContent = c.name + (c.lastMessage ? " · " + c.lastMessage : "");
        div.onclick = () => selectChat(c);
        list.appendChild(div);
    });
}

// ------------------ ВЫБОР ЧАТА ------------------
async function selectChat(chat) {
    currentChat = chat;
    chat-title.textContent = chat.name;
    await loadMessages(chat.id);
}

async function loadMessages(chatId) {
    const res = await fetch(API + "/api/messages?chatId=" + chatId + "&userId=" + currentUser.id);
    const msgs = await res.json();

    const box = document.getElementById("messages");
    box.innerHTML = "";

    msgs.forEach(m => appendMessage(m));
}

function appendMessage(m) {
    const box = document.getElementById("messages");
    const div = document.createElement("div");
    div.className = "msg " + (m.sender_id === currentUser.id ? "me" : "them");
    div.textContent = m.text;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

// ------------------ ОТПРАВКА ------------------
msgSend.onclick = sendMessage;
msgInput.onkeydown = (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
};

function sendMessage() {
    const text = msgInput.value.trim();
    if (!text || !currentChat || !ws || ws.readyState !== WebSocket.OPEN) return;

    ws.send(JSON.stringify({
        type:"send",
        to: currentChat.peerId,
        text
    }));

    msgInput.value = "";
}

// ------------------ ПОИСК ------------------
searchInput.oninput = async () => {
    const q = searchInput.value.trim();
    const box = document.getElementById("search-results");

    if (!q) {
        box.innerHTML = "";
        return;
    }

    const res = await fetch(API + "/api/findUser?q=" + encodeURIComponent(q));
    const users = await res.json();
    renderSearchResults(users);
};

function renderSearchResults(users) {
    const box = document.getElementById("search-results");
    box.innerHTML = "";

    users.forEach(u => {
        if (u.id === currentUser.id) return;

        const div = document.createElement("div");
        div.className = "search-item";
        div.textContent = u.name || u.username || u.phone;

        div.onclick = async () => {
            const res = await fetch(API + "/api/createChat", {
                method:"POST",
                headers:{ "Content-Type":"application/json" },
                body:JSON.stringify({ user1: currentUser.id, user2: u.id })
            });

            const chat = await res.json();
            await loadChats();
            selectChat(chat);

            box.innerHTML = "";
            searchInput.value = "";
        };

        box.appendChild(div);
    });
}
</script>

</body>
</html>
