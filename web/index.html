<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Pulse</title>

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      height: 100vh;
      overflow: hidden;
    }

    /* ======= MOBILE HEADER (Pulse) ======= */
    #mobileHeader {
      display: flex;
      align-items: center;
      padding: 10px 14px;
      background: #1f1f1f;
      height: 56px;
      border-bottom: 1px solid #2a2a2a;
    }

    .pulse-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      margin-right: 12px;
    }

    .pulse-title {
      font-size: 20px;
      font-weight: 600;
      flex: 1;
    }

    .pulse-search-btn {
      font-size: 22px;
      padding: 4px;
      cursor: pointer;
    }

    /* ======= MOBILE SEARCH ======= */
    #mobileSearch {
      display: none;
      padding: 10px;
      background: #1f1f1f;
      border-bottom: 1px solid #2a2a2a;
    }

    #mobileSearchInput {
      width: 100%;
      padding: 10px 14px;
      border-radius: 10px;
      border: none;
      background: #2a2a2a;
      color: white;
      font-size: 16px;
    }

    /* ======= LAYOUT ======= */
    #app {
      display: flex;
      height: calc(100vh - 56px);
    }

    /* ======= SIDEBAR ======= */
    #sidebar {
      width: 320px;
      border-right: 1px solid #1c1c1c;
      background: #111;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #sidebarHeader {
      padding: 10px;
      border-bottom: 1px solid #1c1c1c;
    }

    #searchInput {
      width: 100%;
      padding: 8px 10px;
      border-radius: 8px;
      border: none;
      background: #1f1f1f;
      color: white;
      font-size: 14px;
    }

    #chatListEl {
      flex: 1;
      overflow-y: auto;
    }

    .chat-item {
      display: flex;
      padding: 12px;
      border-bottom: 1px solid #1c1c1c;
      cursor: pointer;
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 12px;
      font-size: 18px;
    }

    .chat-meta {
      flex: 1;
    }

    .chat-name {
      font-size: 16px;
      font-weight: 600;
    }

    .chat-bottom {
      font-size: 14px;
      color: #aaa;
      margin-top: 4px;
    }

    /* ======= MAIN CHAT ======= */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #111;
    }

    #chatHeader {
      display: flex;
      align-items: center;
      padding: 10px 14px;
      background: #1f1f1f;
      height: 56px;
      border-bottom: 1px solid #2a2a2a;
    }

    #backBtn {
      display: none;
      font-size: 22px;
      margin-right: 12px;
      cursor: pointer;
    }

    #chatHeaderName {
      font-size: 18px;
      font-weight: 600;
    }

    #messagesEl {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    .msg-row {
      max-width: 85%;
      margin: 6px 0;
      display: flex;
    }

    .msg-row.me {
      justify-content: flex-end;
    }

    .msg-bubble {
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 15px;
      line-height: 1.3;
      max-width: 100%;
      word-break: break-word;
    }

    .msg-row.me .msg-bubble {
      background: #4a8cff;
      color: white;
      border-bottom-right-radius: 4px;
    }

    .msg-row.other .msg-bubble {
      background: #2a2a2a;
      color: white;
      border-bottom-left-radius: 4px;
    }

    /* ======= INPUT AREA ======= */
    #inputArea {
      padding: 10px;
      background: #1f1f1f;
      border-top: 1px solid #2a2a2a;
      display: flex;
    }

    #msgInput {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: #2a2a2a;
      color: white;
      font-size: 15px;
    }

    #msgSend {
      margin-left: 10px;
      padding: 0 16px;
      background: #4a8cff;
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    /* ======= MOBILE ADAPTATION ======= */
    @media (max-width: 768px) {
      #sidebar {
        width: 100%;
        border-right: none;
      }

      #main {
        display: none;
        width: 100%;
      }

      #backBtn {
        display: block;
      }
    }
  </style>
</head>

<body>

  <!-- MOBILE HEADER -->
  <div id="mobileHeader">
    <img src="pulse-logo.png" class="pulse-avatar">
    <div class="pulse-title">Pulse</div>
    <div class="pulse-search-btn" onclick="openMobileSearch()">🔍</div>
  </div>

  <!-- MOBILE SEARCH -->
  <div id="mobileSearch">
    <input id="mobileSearchInput" placeholder="Поиск">
  </div>

  <!-- APP -->
  <div id="app">

    <!-- SIDEBAR -->
    <div id="sidebar">
      <div id="sidebarHeader">
        <input id="searchInput" placeholder="Поиск">
      </div>
      <div id="chatListEl"></div>
    </div>

    <!-- MAIN CHAT -->
    <div id="main">
      <div id="chatHeader">
        <div id="backBtn">←</div>
        <div id="chatHeaderName"></div>
      </div>

      <div id="messagesEl"></div>

      <div id="inputArea">
        <input id="msgInput" placeholder="Сообщение">
        <button id="msgSend">➤</button>
      </div>
    </div>

  </div>


<script>
  const API = "https://pulse-production-1a74.up.railway.app";
  const WS_URL = "wss://pulse-production-1a74.up.railway.app";
  const DEV_PHONE = "+79620491617";
  const DEV_USERNAME = "&Developer&Official&";

  let fullPhone = "";
  let currentUser = null;
  // Загружаем пользователя, если он был сохранён
try {
    const saved = localStorage.getItem("user");
    if (saved) {
        currentUser = JSON.parse(saved);
    }
} catch (e) {
    currentUser = null;
}

// Если регистрация была незавершённой — сбрасываем
if (currentUser && (
    !currentUser.id ||
    !currentUser.username ||
    !currentUser.name ||
    !currentUser.phone
)) {
    console.warn("Незавершённая регистрация — сбрасываю данные");
    localStorage.removeItem("user");
    currentUser = null;
}

  let currentChat = null;
  let allChats = [];
  let ws = null;

  const screens = {
    phone: document.getElementById("screen-phone"),
    auth: document.getElementById("screen-auth"),
    main: document.getElementById("screen-main")
  };

  function showScreen(name) {
    Object.values(screens).forEach(s => s.style.display = "none");
    screens[name].style.display = name === "main" ? "flex" : "flex";
  }

  // ---------- ЭКРАН 1 ----------
  const countrySelect = document.getElementById("countrySelect");
  const phoneCodeSpan = document.getElementById("phoneCode");
  const phoneLocalInput = document.getElementById("phoneLocal");
  const btnPhoneNext = document.getElementById("btnPhoneNext");

  countrySelect.addEventListener("change", () => {
    const code = countrySelect.selectedOptions[0].dataset.code;
    phoneCodeSpan.textContent = code;
  });

  function normalizePhone(code, local) {
    return code + local.replace(/\D/g, "");
  }

  btnPhoneNext.addEventListener("click", async () => {
    const code = countrySelect.selectedOptions[0].dataset.code;
    const local = phoneLocalInput.value.trim();
    if (!local) return;

    fullPhone = normalizePhone(code, local);

    try {
      const res = await fetch(API + "/api/checkUser?phone=" + encodeURIComponent(fullPhone));
      const data = await res.json();
      setupAuthScreen(data.exists);
      showScreen("auth");
    } catch (e) {
      console.error(e);
      alert("Ошибка сервера");
    }
  });

  // ---------- ЭКРАН 2 ----------
  const authTitle = document.getElementById("authTitle");
  const authPhoneText = document.getElementById("authPhoneText");
  const authExisting = document.getElementById("authExisting");
  const authNew = document.getElementById("authNew");
  const authPassword = document.getElementById("authPassword");
  const regName = document.getElementById("regName");
  const regUsername = document.getElementById("regUsername");
  const usernameStatus = document.getElementById("usernameStatus");
  const regPassword = document.getElementById("regPassword");
  const btnLogin = document.getElementById("btnLogin");
  const btnRegister = document.getElementById("btnRegister");
  const backToPhone1 = document.getElementById("backToPhone1");
  const backToPhone2 = document.getElementById("backToPhone2");

  function setupAuthScreen(exists) {
    authPhoneText.textContent = "Номер: " + fullPhone;
    if (exists) {
      authTitle.textContent = "Вход";
      authExisting.style.display = "flex";
      authNew.style.display = "none";
    } else {
      authTitle.textContent = "Регистрация";
      authExisting.style.display = "none";
      authNew.style.display = "flex";
    }
  }

  backToPhone1.onclick = backToPhone2.onclick = () => {
    showScreen("phone");
  };

  // проверка username в реальном времени
  let usernameTimer = null;
  regUsername.oninput = () => {
    const u = regUsername.value.trim();

    if (!u) {
      usernameStatus.textContent = "";
      usernameStatus.className = "";
      return;
    }

    // если это DEV-username
    if (u === DEV_USERNAME && fullPhone === DEV_PHONE) {
      usernameStatus.textContent = "Уникальное имя разработчика";
      usernameStatus.className = "username-status-dev";
      return;
    }

    // проверка на спец-символы для обычных
    if (!/^[a-z0-9_]{5,32}$/i.test(u)) {
      usernameStatus.textContent = "Спец-символы запрещены. Только латиница, цифры и _ (минимум 5 символов)";
      usernameStatus.className = "username-status-error";
      return;
    }

    usernameStatus.textContent = "Проверяем...";
    usernameStatus.className = "";
    clearTimeout(usernameTimer);
    usernameTimer = setTimeout(async () => {
      try {
        const res = await fetch(API + "/api/checkUsername?u=" + encodeURIComponent(u));
        const data = await res.json();

        if (data.dev) {
          usernameStatus.textContent = "Уникальное имя разработчика";
          usernameStatus.className = "username-status-dev";
        } else if (data.invalid && data.reason === "spec_symbols_forbidden") {
          usernameStatus.textContent = "Спец-символы запрещены. Только латиница, цифры и _ (минимум 5 символов)";
          usernameStatus.className = "username-status-error";
        } else if (data.available) {
          usernameStatus.textContent = "Имя свободно";
          usernameStatus.className = "username-status-ok";
        } else {
          usernameStatus.textContent = "Имя занято";
          usernameStatus.className = "username-status-error";
        }
      } catch (e) {
        console.error(e);
        usernameStatus.textContent = "Ошибка проверки";
        usernameStatus.className = "username-status-error";
      }
    }, 300);
  };

  btnLogin.addEventListener("click", async () => {
    const pass = authPassword.value.trim();
    if (!pass) return;

    try {
      const res = await fetch(API + "/api/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ phone: fullPhone, password: pass })
      });
      const data = await res.json();
      if (!res.ok) {
        alert("Неверный пароль или номер");
        return;
      }
      currentUser = data.user;
      localStorage.setItem("user", JSON.stringify(currentUser));
      await initMainScreen();
      connectWs();
      showScreen("main");
    } catch (e) {
      console.error(e);
      alert("Ошибка сервера");
    }
  });

  btnRegister.addEventListener("click", async () => {
    const name = regName.value.trim();
    const username = regUsername.value.trim();
    const pass = regPassword.value.trim();
    if (!name || !username || !pass) {
      alert("Заполните все поля");
      return;
    }

    // DEV регистрация
    if (fullPhone === DEV_PHONE) {
      if (username !== DEV_USERNAME) {
        alert("Для этого номера доступно только имя " + DEV_USERNAME);
        return;
      }
    } else {
      if (!/^[a-z0-9_]{5,32}$/i.test(username)) {
        alert("Спец-символы запрещены. Только латиница, цифры и _ (минимум 5 символов)");
        return;
      }
    }

    try {
      const res = await fetch(API + "/api/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ phone: fullPhone, name, username, password: pass })
      });
      const data = await res.json();
      if (!res.ok) {
        if (data.error === "user_exists") {
          alert("Аккаунт с таким номером уже существует, попробуйте войти");
        } else if (data.error === "username_taken") {
          alert("Имя пользователя уже занято");
        } else if (data.error === "invalid_username") {
          alert("Некорректный username");
        } else if (data.error === "dev_username_required") {
          alert("Для этого номера доступно только имя " + DEV_USERNAME);
        } else {
          alert("Ошибка регистрации");
        }
        return;
      }
      currentUser = data.user;
      localStorage.setItem("user", JSON.stringify(currentUser));
      await initMainScreen();
      connectWs();
      showScreen("main");
    } catch (e) {
      console.error(e);
      alert("Ошибка сервера");
    }
  });

  // ---------- ЭКРАН 3 ----------
  const sidebarUser = document.getElementById("sidebarUser");
  const chatListEl = document.getElementById("chatList");
  const chatTitle = document.getElementById("chatTitle");
  const chatSub = document.getElementById("chatSub");
  const mainEmpty = document.getElementById("mainEmpty");
  const messagesEl = document.getElementById("messages");
  const msgInput = document.getElementById("msgInput");
  const msgSend = document.getElementById("msgSend");
  const logoutLink = document.getElementById("logoutLink");
  const searchInput = document.getElementById("searchInput");

  async function loadChatsFromServer() {
    const res = await fetch(API + "/api/chats?userId=" + currentUser.id);
    const data = await res.json();
    allChats = data;
  }

  async function renderChatList() {
    await loadChatsFromServer();

    chatListEl.innerHTML = "";

    if (allChats.length === 0) {
      chatListEl.textContent = "У вас пока нет чатов";
      chatListEl.style.color = "var(--text-soft)";
      return;
    }

    const label = document.createElement("div");
    label.className = "section-label";
    label.textContent = "Чаты";
    chatListEl.appendChild(label);

    allChats.forEach(chat => {
      chatListEl.appendChild(renderChatItemFromChat(chat));
    });
  }

  function renderChatItemFromChat(chat) {
    const item = document.createElement("div");
    item.className = "chat-item";
    item.onclick = () => selectChat(chat);

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = chat.name ? chat.name[0] : "?";

    const meta = document.createElement("div");
    meta.className = "chat-meta";

    const top = document.createElement("div");
    top.className = "chat-top";

    const name = document.createElement("div");
    name.className = "chat-name";
    name.textContent = chat.name;

    if (chat.peerUsername === DEV_USERNAME) {
      name.classList.add("chat-name-dev");
    } else if (chat.peerUsername === "NatashaLove") {
      name.classList.add("chat-name-natasha");
    } else {
      name.classList.add("chat-name-normal");
    }


    const time = document.createElement("div");
    time.className = "chat-time";
    time.textContent = chat.lastTime || "";

    top.appendChild(name);
    top.appendChild(time);

    const bottom = document.createElement("div");
    bottom.className = "chat-bottom";
    bottom.textContent = chat.lastMessage || "";

    meta.appendChild(top);
    meta.appendChild(bottom);

    item.appendChild(avatar);
    item.appendChild(meta);

    return item;
  }

  function renderSearchResults(chats, users, messages) {
    chatListEl.innerHTML = "";

    if (!chats.length && !users.length && !messages.length) {
      chatListEl.textContent = "Ничего не найдено";
      return;
    }

    if (users.length) {
      const label = document.createElement("div");
      label.className = "section-label";
      label.textContent = "Пользователи";
      chatListEl.appendChild(label);

      users.forEach(u => {
        const item = document.createElement("div");
        item.className = "chat-item";
        item.onclick = async () => {
          const res = await fetch(API + "/api/chats?userId=" + currentUser.id);
          const existing = await res.json();
          const found = existing.find(c => c.peerId === u.id);
          if (found) {
            allChats = existing;
            await selectChat(found);
          } else {
            alert("Пока чаты создаются через первое сообщение с другого клиента.");
          }
        };

        const avatar = document.createElement("div");
        avatar.className = "avatar";
        avatar.textContent = (u.name || u.username || u.phone)[0];

        const meta = document.createElement("div");
        meta.className = "chat-meta";

        const top = document.createElement("div");
        top.className = "chat-top";

        const name = document.createElement("div");
        name.className = "chat-name";
        name.textContent = u.name || u.username || u.phone;

        if (u.username === DEV_USERNAME) {
          name.classList.add("chat-name-dev");
          bottom.textContent = "Создатель";
        } else if (u.username === "NatashaLove") {
          name.classList.add("chat-name-natasha");
          bottom.textContent = "Особенный пользователь";
        } else {
          name.classList.add("chat-name-normal");
          bottom.textContent = "Пользователь";
        } 


        const time = document.createElement("div");
        time.className = "chat-time";
        time.textContent = u.username ? "@" + u.username : u.phone;

        top.appendChild(name);
        top.appendChild(time);

        const bottom = document.createElement("div");
        bottom.className = "chat-bottom";
        bottom.textContent = u.isDeveloper ? "Разработчик" : "Пользователь";

        meta.appendChild(top);
        meta.appendChild(bottom);

        item.appendChild(avatar);
        item.appendChild(meta);

        chatListEl.appendChild(item);
      });
    }

    if (chats.length) {
      const label = document.createElement("div");
      label.className = "section-label";
      label.textContent = "Чаты";
      chatListEl.appendChild(label);

      chats.forEach(chat => {
        chatListEl.appendChild(renderChatItemFromChat(chat));
      });
    }

    if (messages.length) {
      const label = document.createElement("div");
      label.className = "section-label";
      label.textContent = "Сообщения";
      chatListEl.appendChild(label);

      messages.forEach(m => {
        const item = document.createElement("div");
        item.className = "chat-item";
        item.onclick = async () => {
          const chat = allChats.find(c => c.id === m.chatId);
          if (chat) {
            await selectChat(chat);
          } else {
            await renderChatList();
            const updated = allChats.find(c => c.id === m.chatId);
            if (updated) await selectChat(updated);
          }
        };

        const avatar = document.createElement("div");
        avatar.className = "avatar";
        avatar.textContent = (m.peerName || "?")[0];

        const meta = document.createElement("div");
        meta.className = "chat-meta";

        const top = document.createElement("div");
        top.className = "chat-top";

        const name = document.createElement("div");
        name.className = "chat-name";
        name.textContent = m.peerName;

        if (m.peerUsername === DEV_USERNAME) {
          name.classList.add("chat-name-dev");
        }

        const time = document.createElement("div");
        time.className = "chat-time";
        time.textContent = m.peerUsername ? "@" + m.peerUsername : "";

        top.appendChild(name);
        top.appendChild(time);

        const bottom = document.createElement("div");
        bottom.className = "chat-bottom";
        bottom.textContent = m.snippet;

        meta.appendChild(top);
        meta.appendChild(bottom);

        item.appendChild(avatar);
        item.appendChild(meta);

        chatListEl.appendChild(item);
      });
    }
  }

  searchInput.oninput = async () => {
    const q = searchInput.value.trim();
    if (!q) {
      await renderChatList();
      return;
    }

    const lower = q.toLowerCase();

    const chatsFiltered = allChats.filter(c =>
      (c.name || "").toLowerCase().includes(lower) ||
      (c.lastMessage || "").toLowerCase().includes(lower)
    );

    let users = [];
    let msgs = [];

    try {
      const [uRes, mRes] = await Promise.all([
        fetch(API + "/api/findUser?q=" + encodeURIComponent(q.startsWith("@") ? q.slice(1) : q)),
        fetch(API + "/api/searchMessages?userId=" + currentUser.id + "&q=" + encodeURIComponent(q))
  ]);

      users = await uRes.json();

// 🔥 НЕ показываем самого себя
      users = users.filter(u => u.id !== currentUser.id);

      msgs = await mRes.json();
    } catch (e) {
      console.error(e);
    }

    renderSearchResults(chatsFiltered, users, msgs);
  };

  async function selectChat(chat) {
    currentChat = chat;

    if (!chat) {
      chatTitle.textContent = "Нет чата";
      chatTitle.classList.remove("main-header-title-dev");
      chatSub.textContent = "Выберите контакт, чтобы начать общение";
      mainEmpty.style.display = "flex";
      messagesEl.style.display = "none";
      msgInput.disabled = true;
      msgSend.disabled = true;
      return;
    }

    chatTitle.textContent = chat.name;
    // сбрасываем цвет
chatTitle.classList.remove("main-header-title-dev");
chatTitle.style.color = "";

// ты — оранжевый
    if (chat.peerUsername === DEV_USERNAME) {
      chatTitle.style.color = "#ff8c00"; // оранжевый
      chatTitle.classList.add("main-header-title-dev");

// Наташа — розовая
    } else if (chat.peerUsername === "NatashaLove") {
      chatTitle.style.color = "#ff4fa3"; // розовый

// обычные — стандарт
    } else {
      chatTitle.style.color = ""; 
    }

    chatSub.textContent = chat.peerUsername ? "@" + chat.peerUsername : "";
    mainEmpty.style.display = "none";
    messagesEl.style.display = "block";
    msgInput.disabled = false;
    msgSend.disabled = false;
    messagesEl.innerHTML = "";

    const res = await fetch(
      API + "/api/messages?chatId=" + chat.id + "&userId=" + currentUser.id
    );
    const msgs = await res.json();
    msgs.forEach(m => appendMessage({
      fromMe: m.sender_id === currentUser.id,
      text: m.text
    }));
  }

  function appendMessage(msg) {
    const row = document.createElement("div");
    row.className = "msg-row " + (msg.fromMe ? "me" : "other");
    const bubble = document.createElement("div");
    bubble.className = "msg-bubble";
    bubble.textContent = msg.text;
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function initMainScreen() {
    const uname = currentUser.username ? "@" + currentUser.username : "";
    const isDev = currentUser.isDeveloper;

    sidebarUser.textContent = currentUser.name + (uname ? " · " + uname : " · " + currentUser.phone);
    if (isDev || currentUser.username === DEV_USERNAME || currentUser.phone === DEV_PHONE) {
      sidebarUser.classList.add("sidebar-user-dev");
      sidebarUser.textContent += " · DEV";
    } else {
      sidebarUser.classList.remove("sidebar-user-dev");
    }

    await renderChatList();
    selectChat(null);
  }

  function connectWs() {
    return;
    if (!currentUser) return;
    ws = new WebSocket(WS_URL + "/?userId=" + currentUser.id);

    ws.onmessage = (ev) => {
      try {
        const data = JSON.parse(ev.data);
        if (data.type === "message") {
          const m = data.message;
          if (!currentChat || m.chat_id !== currentChat.id) {
            return;
          }
          appendMessage({
            fromMe: m.sender_id === currentUser.id,
            text: m.text
          });
        }
      } catch (e) {
        console.error("WS parse error", e);
      }
    };
  }

  msgSend.addEventListener("click", () => {
    const text = msgInput.value.trim();
    if (!text || !currentChat || !ws || ws.readyState !== WebSocket.OPEN) return;

    ws.send(JSON.stringify({
      type: "send",
      to: currentChat.peerId,
      text
    }));

    appendMessage({ fromMe: true, text });
    msgInput.value = "";
  });

  msgInput.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      msgSend.click();
    }
  });

  logoutLink.addEventListener("click", () => {
    localStorage.removeItem("user");
    currentUser = null;
    fullPhone = "";
    phoneLocalInput.value = "";
    authPassword.value = "";
    regName.value = "";
    regUsername.value = "";
    regPassword.value = "";
    usernameStatus.textContent = "";
    usernameStatus.className = "";
    if (ws) {
      ws.close();
      ws = null;
    }
    showScreen("phone");
  });

  // ---------- АВТОЛОГИН ----------
  // ---------- АВТОЛОГИН ----------
(async function bootstrap() {
  // если пользователь отсутствует — сразу на ввод номера
  if (!currentUser) {
    showScreen("phone");
    return;
  }

  // проверяем, существует ли пользователь на сервере
  try {
    const res = await fetch(API + "/api/checkUser?phone=" + encodeURIComponent(currentUser.phone));
    const data = await res.json();

    if (!data.exists) {
      console.warn("Пользователь отсутствует на сервере — сбрасываю данные");
      localStorage.removeItem("user");
      currentUser = null;
      showScreen("phone");
      return;
    }
  } catch (e) {
    console.warn("Ошибка проверки пользователя — сбрасываю данные");
    localStorage.removeItem("user");
    currentUser = null;
    showScreen("phone");
    return;
  }

  // если всё ок — логиним
  await initMainScreen();
  connectWs();
  showScreen("main");
})();

</script>
