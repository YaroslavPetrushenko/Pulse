<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Pulse</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        /* ====== БАЗА ====== */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #0d0d0f;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .app {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
        }

        .app-inner {
            width: 100%;
            max-width: 480px;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #0d0d0f;
        }

        /* ====== ЭКРАНЫ ====== */
        .screen {
            flex: 1;
            display: none;
            flex-direction: column;
            padding: 24px;
            animation-duration: .25s;
        }

        .screen.active {
            display: flex;
        }

        .slide-in {
            animation-name: slideIn;
        }

        .slide-out {
            animation-name: slideOut;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to   { transform: translateX(0); opacity: 1; }
        }

        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to   { transform: translateX(-20%); opacity: 0; }
        }

        /* ====== ТЕКСТ ====== */
        .title {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px;
            opacity: 0.7;
            margin-bottom: 24px;
        }

        .label {
            font-size: 13px;
            opacity: 0.8;
            margin-bottom: 6px;
        }

        /* ====== ПОЛЯ ====== */
        .input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid #2a2a2d;
            background: #141417;
            color: #fff;
            font-size: 16px;
            outline: none;
            margin-bottom: 16px;
        }

        .input:focus {
            border-color: #4b6cff;
        }

        /* ====== КНОПКИ ====== */
        .primary-btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: #4b6cff;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: auto;
        }

        .primary-btn:disabled {
            opacity: 0.4;
            cursor: default;
        }

        /* ====== КНОПКА СТРАНЫ ====== */
        .country-btn {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid #2a2a2d;
            background: #141417;
            color: #fff;
            font-size: 16px;
            display: flex;
            justify-content: space-between;
            cursor: pointer;
            margin-bottom: 16px;
        }

        /* ====== COUNTRY PICKER ====== */
        .country-picker-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            display: flex;
            justify-content: center;
            align-items: flex-end;
            z-index: 1000;
        }

        .country-picker {
            width: 100%;
            max-width: 480px;
            max-height: 70%;
            background: #141417;
            border-radius: 16px 16px 0 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
        }

        .country-picker input.search {
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #2a2a2d;
            background: #0d0d0f;
            color: #fff;
            margin-bottom: 12px;
            font-size: 15px;
        }

        .country-picker .items {
            overflow-y: auto;
        }

        .country-item {
            padding: 12px 4px;
            display: flex;
            justify-content: space-between;
            cursor: pointer;
            font-size: 15px;
        }

        .country-item:hover {
            background: #1c1c20;
        }

        /* ====== TOP BAR ====== */
        .top-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .back-btn {
            width: 36px;
            height: 36px;
            border-radius: 12px;
            border: 1px solid #2a2a2d;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
        }

        .top-title {
            font-size: 20px;
            font-weight: 600;
        }
    </style>
</head>

<body>
<div class="app">
    <div class="app-inner">

        <!-- ===================== ЭКРАН: ВВОД НОМЕРА ===================== -->
        <div class="screen" id="screen-phone">
            <div class="title">Ваш номер телефона</div>
            <div class="subtitle">Мы отправим код подтверждения.</div>

            <div class="label">Страна</div>
            <button class="country-btn" id="countryBtn">
                <span class="flag">🇷🇺</span>
                <span class="code">+7</span>
            </button>

            <div class="label">Номер телефона</div>
            <input class="input" id="phoneInput" placeholder="Введите 10 цифр" inputmode="numeric">

            <button class="primary-btn" id="phoneNextBtn" disabled>Продолжить</button>
        </div>

        <!-- ===================== ЭКРАН: ЮЗЕРНЕЙМ ===================== -->
        <div class="screen" id="screen-username">
            <div class="top-bar">
                <div class="back-btn" id="usernameBackBtn">←</div>
                <div class="top-title">Имя пользователя</div>
            </div>

            <div class="subtitle">Выберите уникальное имя.</div>

            <div class="label">Юзернейм</div>
            <input class="input" id="usernameInput" placeholder="@username">
            <div id="usernameStatus" style="font-size:13px; margin-bottom:16px;"></div>

            <button class="primary-btn" id="usernameNextBtn" disabled>Продолжить</button>
        </div>

        <!-- ===================== ЭКРАН: ДОМАШНИЙ ===================== -->
        <div class="screen" id="screen-home">
            <div class="top-title" style="margin-bottom:16px;">Pulse</div>
            <div id="chatList" style="flex:1; overflow-y:auto;"></div>
        </div>

    </div>
</div>

<!-- ===================== СКРИПТЫ ===================== -->
<script src="/js/phone-mask.js"></script>
<script src="/js/country-picker.js"></script>
<script src="/js/username-check.js"></script>

<script>
/* ====== РОУТЕР ====== */
const Screens = {
    current: null,
    show(id, params = {}) {
        const all = document.querySelectorAll('.screen');
        all.forEach(s => s.classList.remove('active', 'slide-in'));

        const next = document.getElementById(id);
        next.classList.add('active', 'slide-in');

        this.current = next;

        if (id === 'screen-phone') initPhoneScreen();
        if (id === 'screen-username') initUsernameScreen(params);
        if (id === 'screen-home') initHomeScreen();
    }
};

/* ====== PHONE SCREEN ====== */
function initPhoneScreen() {
    const countryBtn = document.getElementById('countryBtn');
    const phoneInput = document.getElementById('phoneInput');
    const nextBtn = document.getElementById('phoneNextBtn');

    let currentCountry = { flag: '🇷🇺', code: '+7', name: 'Russia' };

    countryBtn.onclick = () => {
        openCountryPickerOverlay(c => {
            currentCountry = c;
            countryBtn.querySelector('.flag').textContent = c.flag;
            countryBtn.querySelector('.code').textContent = c.code;
        });
    };

    applyPhoneMask(phoneInput);

    phoneInput.addEventListener('input', () => {
        const digits = phoneInput.value.replace(/\D/g, '');
        nextBtn.disabled = digits.length !== 10;
    });

    nextBtn.onclick = () => {
        const phone = phoneInput.value.trim();
        Screens.show('screen-username', { phone, country: currentCountry });
    };
}

/* ====== USERNAME SCREEN ====== */
function initUsernameScreen(params) {
    const backBtn = document.getElementById('usernameBackBtn');
    const input = document.getElementById('usernameInput');
    const status = document.getElementById('usernameStatus');
    const nextBtn = document.getElementById('usernameNextBtn');

    input.value = '';
    status.textContent = '';
    nextBtn.disabled = true;

    const myNumber = "9620491617"; // ← твой номер

    backBtn.onclick = () => Screens.show('screen-phone');

    input.addEventListener('input', () => {
        let v = input.value;

        // Если номер == твой → разрешаем всё
        if (params.phone === myNumber) {
            // Но ограничим длину, чтобы не ломать интерфейс
            if (v.length > 32) v = v.slice(0, 32);
            input.value = v;

            nextBtn.disabled = v.length < 3;

            status.textContent = "Уникальный (твой спец‑режим)";
            status.style.color = "gold";
            return;
        }

        // ======== Обычные пользователи ========

        // Удаляем спец‑символы
        v = v.replace(/[^a-zA-Z0-9_]/g, "");

        // Запрещённые слова
        const banned = ["developer", "official", "admin", "support"];
        if (banned.some(b => v.toLowerCase().includes(b))) {
            input.value = v;
            status.textContent = "Недоступно";
            status.style.color = "red";
            nextBtn.disabled = true;
            return;
        }

        input.value = v;

        // Минимум 3 символа
        nextBtn.disabled = v.length < 3;

        if (v.length >= 3) {
            status.textContent = "Проверка...";
            status.style.color = "#aaa";

            // Имитация проверки занятости
            setTimeout(() => {
                if (v.toLowerCase() === "test" || v.toLowerCase() === "user") {
                    status.textContent = "Занято";
                    status.style.color = "red";
                    nextBtn.disabled = true;
                } else {
                    status.textContent = "Свободно";
                    status.style.color = "green";
                }
            }, 300);
        }
    });

    nextBtn.onclick = () => {
        Screens.show('screen-home');
    };
}


/* ====== HOME SCREEN ====== */
function initHomeScreen() {
    const list = document.getElementById('chatList');
    list.innerHTML = "";

    const mock = [
        { title: "Андрей", last: "Привет!" },
        { title: "Мама", last: "Когда будешь дома?" },
        { title: "Pulse Bot", last: "Добро пожаловать!" }
    ];

    mock.forEach(c => {
        const el = document.createElement('div');
        el.style.padding = "12px 0";
        el.style.borderBottom = "1px solid #1c1c20";
        el.innerHTML = `
            <div style="font-size:16px;">${c.title}</div>
            <div style="font-size:13px; opacity:0.7;">${c.last}</div>
        `;
        list.appendChild(el);
    });
}

/* ====== START ====== */
Screens.show('screen-phone');
</script>

</body>
</html>
