<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Pulse</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #0d0d0f;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .app {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
        }

        .app-inner {
            width: 100%;
            max-width: 480px;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #0d0d0f;
        }

        .screen {
            flex: 1;
            display: none;
            flex-direction: column;
            padding: 24px;
            animation-duration: .25s;
        }

        .screen.active {
            display: flex;
        }

        .slide-in {
            animation-name: slideIn;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to   { transform: translateX(0); opacity: 1; }
        }

        .title {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px;
            opacity: 0.7;
            margin-bottom: 24px;
        }

        .label {
            font-size: 13px;
            opacity: 0.8;
            margin-bottom: 6px;
        }

        .input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid #2a2a2d;
            background: #141417;
            color: #fff;
            font-size: 16px;
            outline: none;
            margin-bottom: 16px;
        }

        .input:focus {
            border-color: #4b6cff;
        }

        .primary-btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: #4b6cff;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: auto;
        }

        .primary-btn:disabled {
            opacity: 0.4;
            cursor: default;
        }

        .country-btn {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid #2a2a2d;
            background: #141417;
            color: #fff;
            font-size: 16px;
            display: flex;
            justify-content: space-between;
            cursor: pointer;
            margin-bottom: 16px;
        }

        .country-picker-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            display: flex;
            justify-content: center;
            align-items: flex-end;
            z-index: 1000;
        }

        .country-picker {
            width: 100%;
            max-width: 480px;
            max-height: 70%;
            background: #141417;
            border-radius: 16px 16px 0 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
        }

        .country-picker input.search {
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #2a2a2d;
            background: #0d0d0f;
            color: #fff;
            margin-bottom: 12px;
            font-size: 15px;
        }

        .country-picker .items {
            overflow-y: auto;
        }

        .country-item {
            padding: 12px 4px;
            display: flex;
            justify-content: space-between;
            cursor: pointer;
            font-size: 15px;
        }

        .country-item:hover {
            background: #1c1c20;
        }

        .top-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .back-btn {
            width: 36px;
            height: 36px;
            border-radius: 12px;
            border: 1px solid #2a2a2d;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
        }

        .top-title {
            font-size: 20px;
            font-weight: 600;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            padding: 12px 0;
            border-bottom: 1px solid #1c1c20;
            cursor: pointer;
        }

        .chat-item-title {
            font-size: 16px;
        }

        .chat-item-last {
            font-size: 13px;
            opacity: 0.7;
        }

        .gold {
            color: #ffd54a;
        }
    </style>
</head>

<body>
<div class="app">
    <div class="app-inner">

        <!-- ЭКРАН: ВВОД НОМЕРА -->
        <div class="screen" id="screen-phone">
            <div class="title">Ваш номер телефона</div>
            <div class="subtitle">Мы отправим код подтверждения.</div>

            <div class="label">Страна</div>
            <button class="country-btn" id="countryBtn">
                <span class="flag">🇷🇺</span>
                <span class="code">+7</span>
            </button>

            <div class="label">Номер телефона</div>
            <input class="input" id="phoneInput" placeholder="Введите 10 цифр" inputmode="numeric">

            <button class="primary-btn" id="phoneNextBtn" disabled>Продолжить</button>
        </div>

        <!-- ЭКРАН: ИМЯ + ЮЗЕРНЕЙМ -->
        <div class="screen" id="screen-username">
            <div class="top-bar">
                <div class="back-btn" id="usernameBackBtn">←</div>
                <div class="top-title">Регистрация</div>
            </div>

            <div class="subtitle">Как к вам обращаться и ваш юзернейм.</div>

            <div class="label">Как вас зовут</div>
            <input class="input" id="nameInput" placeholder="Например, Ярослав">

            <div class="label">Юзернейм</div>
            <input class="input" id="usernameInput" placeholder="@username">
            <div id="usernameStatus" style="font-size:13px; margin-bottom:16px;"></div>

            <button class="primary-btn" id="usernameNextBtn" disabled>Продолжить</button>
        </div>

        <!-- ЭКРАН: ДОМАШНИЙ / ЧАТЫ -->
        <div class="screen" id="screen-home">
            <div class="top-title" id="homeTitle" style="margin-bottom:16px;">Pulse</div>

            <input class="input" id="searchUsers" placeholder="Поиск людей по юзернейму" style="margin-bottom:16px;">

            <div class="chat-list" id="chatList"></div>
        </div>

        <!-- ЭКРАН: ЧАТ -->
        <div class="screen" id="screen-chat">
            <div class="top-bar">
                <div class="back-btn" id="chatBackBtn">←</div>
                <div class="top-title" id="chatTitle">Чат</div>
            </div>

            <div id="chatMessages" style="flex:1; overflow-y:auto; padding-bottom:8px;"></div>

            <div style="display:flex; gap:8px; margin-top:8px;">
                <input class="input" id="chatInput" placeholder="Сообщение" style="margin-bottom:0;">
                <button class="primary-btn" id="chatSendBtn" style="flex:0 0 auto; width:auto; padding:0 18px;">➤</button>
            </div>
        </div>

    </div>
</div>

<script>
    // ===== ГЛОБАЛЬНОЕ СОСТОЯНИЕ =====
    const Current = {
        phone: null,
        username: null,
        name: null,
        myNumber: "9620491617"
    };

    // ===== РОУТЕР =====
    const Screens = {
        current: null,
        show(id, params = {}) {
            const all = document.querySelectorAll('.screen');
            all.forEach(s => s.classList.remove('active', 'slide-in'));

            const next = document.getElementById(id);
            next.classList.add('active', 'slide-in');

            this.current = next;

            if (id === 'screen-phone') initPhoneScreen();
            if (id === 'screen-username') initUsernameScreen(params);
            if (id === 'screen-home') initHomeScreen();
            if (id === 'screen-chat') initChatScreen(params);
        }
    };

    // ===== СТРАНЫ =====
    const countries = [
        { flag: "🇷🇺", code: "+7",  name: "Russia" },
        { flag: "🇰🇿", code: "+7",  name: "Kazakhstan" },
        { flag: "🇺🇸", code: "+1",  name: "United States" },
        { flag: "🇩🇪", code: "+49", name: "Germany" },
        { flag: "🇬🇧", code: "+44", name: "United Kingdom" },
        { flag: "🇺🇦", code: "+380", name: "Ukraine" },
        { flag: "🇫🇷", code: "+33", name: "France" },
        { flag: "🇪🇸", code: "+34", name: "Spain" },
        { flag: "🇮🇹", code: "+39", name: "Italy" },
        { flag: "🇨🇦", code: "+1", name: "Canada" }
    ];

    function openCountryPickerOverlay(onSelect) {
        const overlay = document.createElement('div');
        overlay.className = 'country-picker-overlay';

        const box = document.createElement('div');
        box.className = 'country-picker';
        box.innerHTML = `
            <input class="search" placeholder="Поиск страны">
            <div class="items"></div>
        `;
        overlay.appendChild(box);
        document.body.appendChild(overlay);

        const items = box.querySelector('.items');
        const search = box.querySelector('.search');

        function render(filter = '') {
            items.innerHTML = '';
            countries
                .filter(c => c.name.toLowerCase().includes(filter.toLowerCase()))
                .forEach(c => {
                    const el = document.createElement('div');
                    el.className = 'country-item';
                    el.innerHTML = `
                        <span>${c.flag} ${c.name}</span>
                        <span class="code">${c.code}</span>
                    `;
                    el.onclick = () => {
                        onSelect(c);
                        overlay.remove();
                    };
                    items.appendChild(el);
                });
        }

        search.oninput = () => render(search.value);
        render();

        overlay.onclick = e => {
            if (e.target === overlay) overlay.remove();
        };
    }

    // ===== МАСКА ТЕЛЕФОНА (РОВНО 10 ЦИФР) =====
    function applyPhoneMask(input) {
        input.addEventListener("input", () => {
            let digits = input.value.replace(/\D/g, "");
            if (digits.length > 10) digits = digits.slice(0, 10);
            input.value = digits;
        });
    }

    // ===== ЭКРАН: ТЕЛЕФОН =====
    function initPhoneScreen() {
        const countryBtn = document.getElementById('countryBtn');
        const phoneInput = document.getElementById('phoneInput');
        const nextBtn = document.getElementById('phoneNextBtn');

        let currentCountry = { flag: '🇷🇺', code: '+7', name: 'Russia' };

        countryBtn.onclick = () => {
            openCountryPickerOverlay(c => {
                currentCountry = c;
                countryBtn.querySelector('.flag').textContent = c.flag;
                countryBtn.querySelector('.code').textContent = c.code;
            });
        };

        if (!phoneInput._maskAttached) {
            applyPhoneMask(phoneInput);
            phoneInput._maskAttached = true;
        }

        phoneInput.addEventListener('input', () => {
            const digits = phoneInput.value.replace(/\D/g, '');
            nextBtn.disabled = digits.length !== 10;
        });

        nextBtn.onclick = () => {
            const digits = phoneInput.value.replace(/\D/g, '');
            if (digits.length !== 10) return;

            Current.phone = digits;
            Screens.show('screen-username', { phone: digits, country: currentCountry });
        };
    }

    // ===== ЭКРАН: ИМЯ + ЮЗЕРНЕЙМ =====
    function initUsernameScreen(params) {
        const backBtn = document.getElementById('usernameBackBtn');
        const nameInput = document.getElementById('nameInput');
        const input = document.getElementById('usernameInput');
        const status = document.getElementById('usernameStatus');
        const nextBtn = document.getElementById('usernameNextBtn');

        nameInput.value = Current.name || "";
        input.value = Current.username || "";
        status.textContent = "";
        nextBtn.disabled = true;

        const isYaroslav = (params.phone === Current.myNumber);

        backBtn.onclick = () => Screens.show('screen-phone');

        function validate() {
            let name = nameInput.value.trim();
            let v = input.value;

            if (!isYaroslav) {
                v = v.replace(/[^a-zA-Z0-9_]/g, "");
                input.value = v;
            } else {
                if (v.length > 32) v = v.slice(0, 32);
                input.value = v;
            }

            if (name.length < 2 || v.length < 3) {
                nextBtn.disabled = true;
                status.textContent = "";
                return;
            }

            if (!isYaroslav) {
                const banned = ["developer", "official", "admin", "support"];
                if (banned.some(b => v.toLowerCase().includes(b))) {
                    status.textContent = "Недоступно";
                    status.style.color = "red";
                    nextBtn.disabled = true;
                    return;
                }
            }

            status.textContent = isYaroslav
                ? "Уникальный режим (золотой юзер)"
                : "Проверка...";

            status.style.color = isYaroslav ? "#ffd54a" : "#aaa";
            nextBtn.disabled = false;
        }

        nameInput.oninput = validate;
        input.oninput = validate;

        nextBtn.onclick = () => {
            const name = nameInput.value.trim();
            const username = input.value.trim();
            if (name.length < 2 || username.length < 3) return;

            Current.name = name;
            Current.username = username;

            Screens.show('screen-home');
        };
    }

    // ===== МOCK ДАННЫЕ ДЛЯ ЧАТОВ =====
    const MockUsers = [
        { username: "alex", name: "Алексей" },
        { username: "maria", name: "Мария" },
        { username: "pulsebot", name: "Pulse Bot" },
        { username: "dev", name: "Разработчик" }
    ];

    let MockChats = [];
    let MockMessages = {};

    function getOrCreateChatWith(username) {
        let chat = MockChats.find(c => c.username === username);
        if (!chat) {
            chat = {
                id: "chat_" + username,
                username,
                title: "@" + username,
                lastMessage: ""
            };
            MockChats.push(chat);
            MockMessages[chat.id] = [];
        }
        return chat;
    }

    // ===== ЭКРАН: HOME / ЧАТЫ =====
    function initHomeScreen() {
        const titleEl = document.getElementById('homeTitle');
        const searchBox = document.getElementById('searchUsers');
        const list = document.getElementById('chatList');

        const isYaroslav = (Current.phone === Current.myNumber);
        const uname = Current.username || "user";

        titleEl.innerHTML = `Pulse <span class="${isYaroslav ? 'gold' : ''}" style="opacity:0.8; font-size:14px;">| @${uname}</span>`;

        searchBox.value = "";

        searchBox.oninput = () => {
            const q = searchBox.value.trim().toLowerCase();
            if (!q) {
                renderChats();
                return;
            }

            const found = MockUsers.filter(u => u.username.toLowerCase().includes(q));
            list.innerHTML = "";

            if (found.length === 0) {
                list.innerHTML = `<div style="opacity:0.6; padding:12px;">Никого не найдено</div>`;
                return;
            }

            found.forEach(u => {
                const el = document.createElement('div');
                el.className = "chat-item";
                el.innerHTML = `
                    <div class="chat-item-title">@${u.username}</div>
                    <div class="chat-item-last" style="opacity:0.6;">Нажмите, чтобы начать чат</div>
                `;
                el.onclick = () => {
                    const chat = getOrCreateChatWith(u.username);
                    Screens.show('screen-chat', { chatId: chat.id });
                };
                list.appendChild(el);
            });
        };

        function renderChats() {
            list.innerHTML = "";

            if (!MockChats.length) {
                list.innerHTML = `<div style="opacity:0.6; padding:12px;">У вас пока нет чатов</div>`;
                return;
            }

            MockChats.forEach(chat => {
                const el = document.createElement('div');
                el.className = "chat-item";
                el.innerHTML = `
                    <div class="chat-item-title">${chat.title}</div>
                    <div class="chat-item-last">${chat.lastMessage || ""}</div>
                `;
                el.onclick = () => {
                    Screens.show('screen-chat', { chatId: chat.id });
                };
                list.appendChild(el);
            });
        }

        renderChats();
    }

    // ===== ЭКРАН: ЧАТ =====
    function initChatScreen(params) {
        const backBtn = document.getElementById('chatBackBtn');
        const titleEl = document.getElementById('chatTitle');
        const messagesEl = document.getElementById('chatMessages');
        const input = document.getElementById('chatInput');
        const sendBtn = document.getElementById('chatSendBtn');

        const chatId = params.chatId;
        const chat = MockChats.find(c => c.id === chatId);
        if (!chat) {
            Screens.show('screen-home');
            return;
        }

        const isYaroslav = (Current.phone === Current.myNumber);
        const myName = Current.name || "Вы";
        const myUser = Current.username || "user";

        titleEl.innerHTML = `${chat.title} ${isYaroslav ? '<span class="gold" style="font-size:14px; opacity:0.8;">(вы)</span>' : ''}`;

        backBtn.onclick = () => Screens.show('screen-home');

        messagesEl.innerHTML = "";
        const msgs = MockMessages[chatId] || [];
        msgs.forEach(m => {
            const el = document.createElement('div');
            el.style.margin = "6px 0";
            el.style.fontSize = "14px";
            el.style.textAlign = m.from === "me" ? "right" : "left";
            el.innerHTML = `
                <span style="opacity:0.7; font-size:12px;">${m.from === "me" ? (isYaroslav ? '<span class="gold">@'+myUser+'</span>' : '@'+myUser) : '@'+chat.username}</span><br>
                ${m.text}
            `;
            messagesEl.appendChild(el);
        });
        messagesEl.scrollTop = messagesEl.scrollHeight;

        input.value = "";

        sendBtn.onclick = () => {
            const text = input.value.trim();
            if (!text) return;

            const msg = { from: "me", text };
            MockMessages[chatId].push(msg);
            chat.lastMessage = text;

            const el = document.createElement('div');
            el.style.margin = "6px 0";
            el.style.fontSize = "14px";
            el.style.textAlign = "right";
            el.innerHTML = `
                <span style="opacity:0.7; font-size:12px;">${isYaroslav ? '<span class="gold">@'+myUser+'</span>' : '@'+myUser}</span><br>
                ${text}
            `;
            messagesEl.appendChild(el);

            input.value = "";
            messagesEl.scrollTop = messagesEl.scrollHeight;
        };
    }

    // ===== СТАРТ =====
    Screens.show('screen-phone');
</script>

</body>
</html>
